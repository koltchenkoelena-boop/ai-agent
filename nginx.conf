# Nginx reverse-proxy config for multi-agent web chat
# Proxies WebSocket connections to individual agents

server {
    listen 80;
    server_name _;

    # Static web chat files
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # WebSocket proxy for each agent
    location /ws/planner/ {
        proxy_pass http://planner:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ws/coder/ {
        proxy_pass http://coder:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ws/researcher/ {
        proxy_pass http://researcher:8003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /ws/reviewer/ {
        proxy_pass http://reviewer:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # API proxy
    location /api/planner/ {
        proxy_pass http://planner:8001/;
    }
    location /api/coder/ {
        proxy_pass http://coder:8002/;
    }
    location /api/researcher/ {
        proxy_pass http://researcher:8003/;
    }
    location /api/reviewer/ {
        proxy_pass http://reviewer:8004/;
    }
}
