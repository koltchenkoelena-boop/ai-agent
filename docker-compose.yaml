version: "3.8"

# Multi-Agent System — Docker Compose
# Запуск: docker compose up -d
# Web chat: http://localhost:8000
# Agent APIs: http://localhost:8001-8004

services:
  planner:
    build: .
    container_name: agent-planner
    command: python agent_server.py planner
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./shared:/app/shared
      - planner-sandbox:/app/sandbox/planner
    environment:
      - AGENT_NAME=planner
      - AGENT_BIND_HOST=0.0.0.0
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
    restart: unless-stopped
    networks:
      - agents

  coder:
    build: .
    container_name: agent-coder
    command: python agent_server.py coder
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - ./shared:/app/shared
      - coder-sandbox:/app/sandbox/coder
    environment:
      - AGENT_NAME=coder
      - AGENT_BIND_HOST=0.0.0.0
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
    restart: unless-stopped
    networks:
      - agents

  researcher:
    build: .
    container_name: agent-researcher
    command: python agent_server.py researcher
    ports:
      - "127.0.0.1:8003:8003"
    volumes:
      - ./shared:/app/shared
      - researcher-sandbox:/app/sandbox/researcher
    environment:
      - AGENT_NAME=researcher
      - AGENT_BIND_HOST=0.0.0.0
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
    restart: unless-stopped
    networks:
      - agents

  reviewer:
    build: .
    container_name: agent-reviewer
    command: python agent_server.py reviewer
    ports:
      - "127.0.0.1:8004:8004"
    volumes:
      - ./shared:/app/shared
      - reviewer-sandbox:/app/sandbox/reviewer
    environment:
      - AGENT_NAME=reviewer
      - AGENT_BIND_HOST=0.0.0.0
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal}
    restart: unless-stopped
    networks:
      - agents

  web:
    image: nginx:alpine
    container_name: agent-web
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - planner
      - coder
      - researcher
      - reviewer
    restart: unless-stopped
    networks:
      - agents

volumes:
  planner-sandbox:
  coder-sandbox:
  researcher-sandbox:
  reviewer-sandbox:

networks:
  agents:
    driver: bridge
