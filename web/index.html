<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 240px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { color: #e94560; margin-bottom: 16px; font-size: 18px; }
        .agent-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #0f3460;
            border: 1px solid #1a1a4e;
            border-radius: 8px;
            color: #eee;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .agent-btn:hover { background: #1a1a6e; }
        .agent-btn.active { background: #e94560; border-color: #e94560; }
        .agent-btn .agent-name { font-weight: 600; }
        .agent-btn .agent-desc { font-size: 11px; opacity: 0.7; margin-top: 4px; }
        .agent-btn .agent-status {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #666;
            margin-right: 6px;
        }
        .agent-btn .agent-status.online { background: #4caf50; }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 16px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header h3 { color: #e94560; }
        .chat-header .model-tag {
            background: #0f3460;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1a1a4e;
            border: 1px solid #2a2a5e;
        }
        .message.streaming { border-color: #e94560; }
        .message code {
            background: #0a0a1e;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .message pre {
            background: #0a0a1e;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 0;
            overflow-x: auto;
        }

        .input-area {
            padding: 16px 24px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 12px;
        }
        .input-area textarea {
            flex: 1;
            background: #0f3460;
            border: 1px solid #1a1a4e;
            border-radius: 8px;
            color: #eee;
            padding: 12px;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
        }
        .input-area textarea:focus { outline: none; border-color: #e94560; }
        .input-area button {
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #d63851; }
        .input-area button:disabled { background: #666; cursor: not-allowed; }

        .connection-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .connection-status.connected { color: #4caf50; }
        .connection-status.disconnected { color: #f44336; }

        .message a { color: #64b5f6; text-decoration: underline; }
        .message .chat-img {
            display: block;
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
        }
        .message .chat-img:hover { opacity: 0.9; box-shadow: 0 0 10px rgba(233,69,96,0.3); }

        /* Auth */
        .auth-modal {
            position: fixed;
            top: 0; right: 0; bottom: 0; left: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            -webkit-overflow-scrolling: touch;
        }
        .auth-form {
            background: #16213e;
            padding: 32px;
            border-radius: 16px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .auth-form h2 { color: #e94560; text-align: center; }
        .auth-form input {
            background: #0f3460;
            border: 1px solid #1a1a4e;
            border-radius: 8px;
            color: #eee;
            padding: 12px;
            font-size: 16px;
        }
        .auth-form input:focus { outline: none; border-color: #e94560; }
        .auth-buttons { display: flex; gap: 8px; }
        .auth-buttons button {
            flex: 1;
            padding: 14px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: #e94560;
            color: white;
            font-size: 15px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(233,69,96,0.4);
            -webkit-appearance: none;
            appearance: none;
        }
        .auth-buttons button:active { opacity: 0.7; }
        .auth-buttons button.secondary { background: #0f3460; }
        .auth-error { color: #f44336; font-size: 13px; text-align: center; min-height: 20px; }
        .auth-modal.hidden { display: none; }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .sidebar-footer #username-display {
            font-size: 13px;
            font-weight: 600;
            color: #eee;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .logout-btn {
            background: #0f3460;
            border: 1px solid #1a1a4e;
            border-radius: 8px;
            color: #eee;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
        }
        .logout-btn:hover { background: #1a1a6e; }

        /* Mobile drawer */
        .menu-toggle {
            display: none;
            background: #0f3460;
            border: 1px solid #1a1a4e;
            border-radius: 8px;
            color: #eee;
            font-size: 20px;
            line-height: 1;
            padding: 6px 12px;
            cursor: pointer;
            margin-right: 12px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; right: 0; bottom: 0; left: 0;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }
        @media (max-width: 720px) {
            .menu-toggle { display: block; }
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 100;
                width: 260px;
                max-width: 82vw;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                box-shadow: 2px 0 18px rgba(0,0,0,0.5);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .chat-header { padding: 12px 14px; }
            .chat-header h3 { font-size: 16px; }
            .chat-header .model-tag { font-size: 11px; }
            .messages { padding: 14px; gap: 10px; }
            .message { max-width: 90%; }
            .input-area { padding: 12px 14px; gap: 8px; }
            .input-area button { padding: 12px 16px; }
            .auth-form { width: 90vw; max-width: 360px; padding: 24px; }
        }
    </style>
</head>
<body>
    <div id="auth-modal" class="auth-modal">
        <div class="auth-form">
            <h2>🤖 Multi-Agent Chat</h2>
            <p style="text-align:center;font-size:13px;opacity:0.7;margin-bottom:4px">Войдите или зарегистрируйтесь</p>
            <input type="text" id="auth-username" placeholder="Имя пользователя" autocomplete="username">
            <input type="password" id="auth-password" placeholder="Пароль (мин. 4 символа)" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter'){event.preventDefault();doLogin();}">
            <div class="auth-buttons">
                <button onclick="doLogin()">🔑 Войти</button>
                <button onclick="doSignup()" class="secondary">📝 Регистрация</button>
            </div>
            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>
    <div class="sidebar">
        <h2>Agents</h2>
        <div id="agent-list"></div>
        <div class="sidebar-footer">
            <a href="quad.html" target="_blank" style="font-size:11px;color:#64b5f6;text-decoration:none;">⊞ 4 панели</a>
            <a href="dispatcher.html" target="_blank" style="font-size:11px;color:#e94560;text-decoration:none;">⚙ Диспетчер</a>
            <span id="username-display"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div class="chat-area">
        <div class="chat-header">
            <div style="display:flex;align-items:center;">
                <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">☰</button>
                <div>
                    <h3 id="current-agent-name">Select an agent</h3>
                    <span class="connection-status disconnected" id="conn-status">disconnected</span>
                </div>
            </div>
            <span class="model-tag" id="current-model">—</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <textarea id="input" placeholder="Type a message..." rows="1"
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
    const AGENTS = [
        { name: 'planner', port: 8001, desc: 'Планировщик задач' },
        { name: 'coder', port: 8002, desc: 'Разработчик кода' },
        { name: 'researcher', port: 8003, desc: 'Исследователь' },
        { name: 'reviewer', port: 8004, desc: 'Ревьюер' },
    ];

    let currentAgent = null;
    let ws = null;
    let sessionId = localStorage.getItem('session_id');
    if (!sessionId) {
        sessionId = 'sess-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('session_id', sessionId);
    }
    let streamingMsg = null;

    // Determine base host and routing mode
    const BASE_HOST = window.location.hostname;
    const BASE_PORT = window.location.port;
    // If accessed via standard port (80/443 through nginx) — use path-based routing
    const USE_PROXY = !BASE_PORT || BASE_PORT === '80' || BASE_PORT === '443';

    function agentUrl(agent, path) {
        if (USE_PROXY) {
            return `${window.location.origin}/${agent.name}${path}`;
        }
        return `http://${BASE_HOST}:${agent.port}${path}`;
    }

    function agentWsUrl(agent, path) {
        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        if (USE_PROXY) {
            return `${proto}//${window.location.host}/${agent.name}${path}`;
        }
        return `${proto}//${BASE_HOST}:${agent.port}${path}`;
    }

    // ---- Auth ----
    function showAuthModal() {
        document.getElementById('auth-modal').classList.remove('hidden');
        document.getElementById('auth-username').focus();
    }

    function hideAuthModal() {
        document.getElementById('auth-modal').classList.add('hidden');
        document.getElementById('auth-error').textContent = '';
    }

    function authHeaders() {
        return { 'Content-Type': 'application/json' };
    }

    async function doAuth(endpoint) {
        const username = document.getElementById('auth-username').value.trim();
        const password = document.getElementById('auth-password').value;
        const errEl = document.getElementById('auth-error');
        errEl.textContent = '';
        if (!username || !password) {
            errEl.textContent = 'Введите имя и пароль';
            return;
        }
        // авторизация через первый агент (токен кросс-агентный)
        try {
            const resp = await fetch(agentUrl(AGENTS[0], `/auth/${endpoint}`), {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ username, password })
            });
            const data = await resp.json();
            if (!resp.ok) {
                errEl.textContent = data.detail || 'Ошибка авторизации';
                return;
            }
            localStorage.setItem('auth_token', data.token);
            localStorage.setItem('auth_username', data.username);
            document.getElementById('auth-password').value = '';
            hideAuthModal();
            startApp();
        } catch (e) {
            errEl.textContent = 'Сервер недоступен';
        }
    }

    function doLogin() { doAuth('login'); }
    function doSignup() { doAuth('signup'); }

    function logout() {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('auth_username');
        if (ws) ws.close();
        document.getElementById('messages').innerHTML = '';
        document.getElementById('username-display').textContent = '';
        showAuthModal();
    }

    async function checkAuth() {
        const token = localStorage.getItem('auth_token');
        if (!token) return false;
        try {
            const resp = await fetch(agentUrl(AGENTS[0], `/auth/me?token=${encodeURIComponent(token)}`),
                { signal: AbortSignal.timeout(3000) });
            if (resp.status === 401) {
                localStorage.removeItem('auth_token');
                return false;
            }
            return resp.ok;
        } catch (e) {
            // сервер недоступен — пускаем по сохранённому токену
            return true;
        }
    }

    async function init() {
        if (await checkAuth()) {
            hideAuthModal();
            startApp();
        } else {
            showAuthModal();
        }
    }

    function startApp() {
        const username = localStorage.getItem('auth_username');
        document.getElementById('username-display').textContent = username || '';

        const list = document.getElementById('agent-list');
        list.innerHTML = '';
        AGENTS.forEach(agent => {
            const btn = document.createElement('button');
            btn.className = 'agent-btn';
            btn.innerHTML = `
                <span class="agent-status" id="status-${agent.name}"></span>
                <span class="agent-name">${agent.name}</span>
                <div class="agent-desc">${agent.desc}</div>
            `;
            btn.onclick = () => selectAgent(agent);
            list.appendChild(btn);
        });

        // Check health of all agents
        AGENTS.forEach(checkHealth);
    }

    async function checkHealth(agent) {
        try {
            const resp = await fetch(agentUrl(agent, '/health'), { signal: AbortSignal.timeout(3000) });
            if (resp.ok) {
                document.getElementById(`status-${agent.name}`).classList.add('online');
            }
        } catch (e) {
            // Agent offline
        }
    }

    function toggleSidebar() {
        const sb = document.querySelector(".sidebar");
        const ov = document.getElementById("sidebar-overlay");
        const open = sb.classList.toggle("open");
        ov.classList.toggle("show", open);
    }
    function closeSidebar() {
        document.querySelector(".sidebar").classList.remove("open");
        document.getElementById("sidebar-overlay").classList.remove("show");
    }

    function selectAgent(agent) {
        currentAgent = agent;
        closeSidebar();
        // сессия одна на всё время вкладки — НЕ сбрасываем при смене агента

        // Update UI
        document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('current-agent-name').textContent = agent.name;
        document.getElementById('messages').innerHTML = '';

        // Fetch model info
        fetch(agentUrl(agent, '/info'))
            .then(r => r.json())
            .then(data => {
                document.getElementById('current-model').textContent = data.model;
            })
            .catch(() => {
                document.getElementById('current-model').textContent = 'offline';
            });

        connectWebSocket(agent);
    }

    function connectWebSocket(agent) {
        if (ws) ws.close();

        const token = localStorage.getItem('auth_token');
        ws = new WebSocket(agentWsUrl(agent, `/ws/${sessionId}?token=${encodeURIComponent(token)}`));

        ws.onopen = () => {
            document.getElementById('conn-status').textContent = 'connected';
            document.getElementById('conn-status').className = 'connection-status connected';
        };

        ws.onclose = (event) => {
            document.getElementById('conn-status').textContent = 'disconnected';
            document.getElementById('conn-status').className = 'connection-status disconnected';
            if (event.code === 4001) {
                // unauthorized — сбрасываем токен и показываем логин
                localStorage.removeItem('auth_token');
                showAuthModal();
            }
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'chunk') {
                if (!streamingMsg) {
                    streamingMsg = addMessage('', 'assistant');
                    streamingMsg.classList.add('streaming');
                }
                streamingMsg.textContent += data.content;
                scrollToBottom();
            } else if (data.type === 'tool_result') {
                if (streamingMsg) {
                    streamingMsg.innerHTML += `<pre><code>${escapeHtml(data.content)}</code></pre>`;
                    scrollToBottom();
                }
            } else if (data.type === 'done') {
                if (streamingMsg) {
                    streamingMsg.innerHTML = renderMarkdown(streamingMsg.textContent);
                    streamingMsg.classList.remove('streaming');
                    streamingMsg = null;
                }
                document.getElementById('send-btn').disabled = false;
            }
        };
    }

    function sendMessage() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

        addMessage(text, 'user');
        ws.send(JSON.stringify({ content: text }));
        input.value = '';
        document.getElementById('send-btn').disabled = true;
    }

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = text;
        document.getElementById('messages').appendChild(div);
        scrollToBottom();
        return div;
    }

    function scrollToBottom() {
        const msgs = document.getElementById('messages');
        msgs.scrollTop = msgs.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderMarkdown(text) {
        let html = escapeHtml(text);
        // Images: ![alt](url) — allow whitespace/newlines between ] and (
        html = html.replace(/!\[([^\]]*)\]\s*\(([^)]+)\)/g, '<img src="$2" alt="$1" class="chat-img" onerror="this.style.display=\'none\'">');
        // Bare image URLs on their own line
        html = html.replace(/(^|<br>|\n)(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp)[^\s]*)(<br>|\n|$)/gi, '$1<img src="$2" class="chat-img" onerror="this.style.display=\'none\'">$3');
        // Links: [text](url)
        html = html.replace(/\[([^\]]+)\]\s*\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        // Bold: **text**
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        // Code blocks: ```...```
        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        // Inline code: `text`
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Line breaks
        html = html.replace(/\n/g, '<br>');
        return html;
    }

    init();
    </script>
</body>
</html>
